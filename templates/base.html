<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block document_title %}Ledger{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-180.png') }}">
  <!-- Tailwind (CDN for MVP) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-50 text-zinc-900">
  <header class="border-b border-zinc-200 bg-white">
    <div class="mx-auto max-w-3xl px-4 py-3 sm:py-4">
      <a href="{{ url_for('index') }}"
         class="inline-flex items-center gap-2.5 text-lg font-semibold tracking-tight text-zinc-900 hover:text-zinc-700">
        <img src="{{ url_for('static', filename='logo.png') }}" alt=""
          class="h-9 w-9 shrink-0 object-contain" width="36" height="36">
        Ledger
      </a>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-8">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="mb-4 rounded-md border border-zinc-200 bg-zinc-100 px-4 py-3 text-sm text-zinc-800">
          {% for m in messages %}{{ m }}{% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
